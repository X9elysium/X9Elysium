version: 2
updates:
  # GitHub Actions — keep workflow runners and actions current.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Toronto"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
    groups:
      actions-minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # Root npm dependencies — Next.js, React, Tailwind, etc.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Toronto"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "npm"
    # Ignore framework majors — those need manual review and migration plan.
    ignore:
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "tailwindcss"
        update-types: ["version-update:semver-major"]
    groups:
      production-minor-and-patch:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      development-minor-and-patch:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"

  # X automation script deps — separate package.json under scripts/x.
  - package-ecosystem: "npm"
    directory: "/scripts/x"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "09:00"
      timezone: "America/Toronto"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "automation"
