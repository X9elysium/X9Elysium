name: X — post next thought

on:
  schedule:
    # Use :13 to dodge the top-of-hour cron drift on GH Actions runners.
    # 17:13 UTC = 09:13 PST / 10:13 PDT  (morning slot)
    # 01:13 UTC = 17:13 PST / 18:13 PDT  (evening slot)
    - cron: "13 17 * * *"
    - cron: "13 1 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no post, no commit)"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write

concurrency:
  group: x-post
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install x-automation deps
        working-directory: scripts/x
        run: npm install --no-audit --no-fund

      - name: Post next thought
        working-directory: scripts/x
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            node post-next-thought.mjs --dry-run
          else
            node post-next-thought.mjs
          fi

      - name: Sync metrics (best effort)
        if: ${{ inputs.dry_run != 'true' }}
        working-directory: scripts/x
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        continue-on-error: true
        run: node sync-metrics.mjs

      - name: Commit and push
        if: ${{ inputs.dry_run != 'true' }}
        run: |
          git config user.name "x9elysium-bot"
          git config user.email "automation@x9elysium.com"
          git add data/x-thoughts.md data/x-posted.json data/tweets.json docs/admin-dashboard/sample-data/x-posts.csv 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "no changes to commit"
            exit 0
          fi
          NEXT_ID=$(node -e "const l=require('./data/x-posted.json');console.log(l.posts[0]?.id||'unknown')")
          git commit -m "x: posted ${NEXT_ID}"
          git push origin HEAD:main
